name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: openfmis_test
          POSTGRES_PASSWORD: openfmis_test
          POSTGRES_DB: openfmis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openfmis_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://openfmis_test:openfmis_test@localhost:5432/openfmis_test
      JWT_SECRET_KEY: ci-test-secret-key
      APP_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev libproj-dev \
            libpango-1.0-0 libpangocairo-1.0-0 libcairo2

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Enable PostGIS extension
        run: |
          PGPASSWORD=openfmis_test psql -h localhost -U openfmis_test -d openfmis_test \
            -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Run migrations
        run: alembic upgrade head

      - name: Run tests
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Lint
        run: ruff check src/ tests/

      - name: Format check
        run: ruff format --check src/ tests/

  migrate:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: openfmis_test
          POSTGRES_PASSWORD: openfmis_test
          POSTGRES_DB: openfmis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U openfmis_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://openfmis_test:openfmis_test@localhost:5432/openfmis_test
      JWT_SECRET_KEY: ci-test-secret-key

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -e .

      - name: Enable PostGIS
        run: |
          PGPASSWORD=openfmis_test psql -h localhost -U openfmis_test -d openfmis_test \
            -c "CREATE EXTENSION IF NOT EXISTS postgis;"

      - name: Upgrade to head
        run: alembic upgrade head

      - name: Downgrade to base
        run: alembic downgrade base

      - name: Re-upgrade to head
        run: alembic upgrade head
