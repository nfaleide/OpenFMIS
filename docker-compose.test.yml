services:
  test-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: openfmis_test
      POSTGRES_PASSWORD: openfmis_test
      POSTGRES_DB: openfmis_test
    ports:
      - "5433:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfmis_test"]
      interval: 3s
      timeout: 2s
      retries: 5
