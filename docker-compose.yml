services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: openfmis
      POSTGRES_PASSWORD: openfmis
      POSTGRES_DB: openfmis
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openfmis"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
